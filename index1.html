<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Website</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    line-height: 1.6;
}

/* NAVBAR */
nav {
    background: #111;
    color: #fff;
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav h1 {
    font-size: 24px;
}

nav ul {
    list-style: none;
    display: flex;
}

nav ul li {
    margin-left: 20px;
}

nav ul li a {
    color: #fff;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 90vh;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

.hero h2 {
    font-size: 50px;
}

.hero p {
    margin: 20px 0;
}

.hero button {
    padding: 10px 20px;
    border: none;
    background: #fff;
    color: #333;
    cursor: pointer;
}

/* SECTION */
.section {
    padding: 60px 50px;
}

.section h2 {
    text-align: center;
    margin-bottom: 40px;
}

/* SERVICES */
.services {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.service-box {
    background: #f4f4f4;
    padding: 20px;
    text-align: center;
}

/* PORTFOLIO */
.portfolio {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.portfolio img {
    width: 100%;
}

/* TESTIMONIALS */
.testimonials {
    display: flex;
    gap: 20px;
}

.testimonial {
    background: #eee;
    padding: 20px;
}

/* FOOTER */
footer {
    background: #111;
    color: #fff;
    text-align: center;
    padding: 20px;
}
